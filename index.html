<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PixelFill" />
  <meta name="theme-color" content="#0f0f14" />
  <title>PixelFill</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f14; --surface: #1a1a24; --border: #2a2a3a;
      --text: #e8e8f0; --muted: #5a5a7a; --accent: #7c6fff;
      --accent2: #ff6fb0; --success: #6fffa0;
      --cell-size: 32px; --palette-h: 120px; --header-h: 60px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; overflow: hidden; touch-action: none; }

    /* SCREENS */
    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
    .screen.active { opacity: 1; pointer-events: all; }

    /* HEADER */
    .app-header { height: var(--header-h); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10; }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
    
    /* UPLOAD BUTTON */
    .btn-upload { background: var(--accent); color: white; border: none; padding: 8px 14px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-upload:active { transform: scale(0.95); }

    .btn-back { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; padding: 6px 0; letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent; }
    .btn-back:hover { color: var(--text); }
    .btn-back svg { width: 16px; height: 16px; }

    /* LIBRARY */
    #screen-library { background: var(--bg); }
    #library-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px 16px 32px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .lib-greeting { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .lib-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 24px; }
    .category-section { margin-bottom: 32px; }
    .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .category-icon { font-size: 20px; }
    .category-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
    .category-count { font-size: 10px; color: var(--muted); margin-left: auto; letter-spacing: 0.5px; }
    .puzzle-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .puzzle-row::-webkit-scrollbar { display: none; }
    .puzzle-card { flex-shrink: 0; width: 130px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); cursor: pointer; overflow: hidden; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent; position: relative; }
    .puzzle-card:active { transform: scale(0.96); }
    .puzzle-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(124,111,255,0.2); }
    .puzzle-thumb-wrap { width: 130px; height: 100px; display: flex; align-items: center; justify-content: center; background: var(--bg); overflow: hidden; }
    .puzzle-thumb { image-rendering: pixelated; display: block; }
    .puzzle-card-info { padding: 8px 10px 10px; }
    .puzzle-card-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .puzzle-card-meta { display: flex; align-items: center; gap: 6px; }
    .difficulty-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
    .diff-easy   { background: rgba(111,255,160,0.15); color: #6fffa0; }
    .diff-medium { background: rgba(255,211,63,0.15);  color: #ffd33f; }
    .diff-hard   { background: rgba(255,111,176,0.15); color: #ff6fb0; }
    .puzzle-size-tag { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; }
    .puzzle-card.completed::after { content: '✓'; position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; background: var(--success); color: #000; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

    /* GAME */
    #screen-game { background: var(--bg); }
    #progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    #progress-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    #progress-bar-bg { width: 110px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.3s ease; }
    #canvas-wrap { position: absolute; top: var(--header-h); bottom: var(--palette-h); left: 0; right: 0; overflow: hidden; cursor: grab; }
    #canvas-wrap.grabbing { cursor: grabbing; }
    #canvas-inner { position: absolute; top: 50%; left: 50%; transform-origin: center center; }
    #grid { display: grid; border: 2px solid var(--border); border-radius: 4px; overflow: hidden; user-select: none; }
    .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: 'Space Mono', monospace; font-weight: 700; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; position: relative; background: var(--surface); color: var(--muted); -webkit-tap-highlight-color: transparent; }
    .cell.filled { color: transparent; border-color: rgba(0,0,0,0.2); }
    .cell.highlight { background: rgba(124, 111, 255, 0.12); box-shadow: inset 0 0 10px rgba(124, 111, 255, 0.25); border-color: rgba(124, 111, 255, 0.4); z-index: 2; }
    .cell.wrong-colour { animation: shake 0.3s ease; }
    .cell.correct-flash { animation: flashIn 0.25s ease forwards; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
    @keyframes flashIn { 0%{filter:brightness(2.5)} 100%{filter:brightness(1)} }
    #palette { position: absolute; bottom: 0; left: 0; right: 0; height: var(--palette-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px 12px; gap: 8px; z-index: 10; }
    #palette-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    #swatches { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    #swatches::-webkit-scrollbar { display: none; }
    .swatch-wrap { position: relative; flex-shrink: 0; width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .swatch-ring { position: absolute; inset: 0; width: 54px; height: 54px; transform: rotate(-90deg); pointer-events: none; }
    .swatch-ring .ring-bg { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 3; }
    .swatch-ring .ring-fg { fill: none; stroke: white; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
    .swatch { width: 40px; height: 40px; border-radius: 8px; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: 'Space Mono', monospace; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; position: relative; z-index: 1; }
    .swatch .swatch-num { color: rgba(0,0,0,0.7); text-shadow: 0 1px 0 rgba(255,255,255,0.3); pointer-events: none; }
    .swatch-wrap.selected .swatch { border-color: white; transform: scale(1.1) translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
    .swatch-wrap.exhausted { opacity: 0.4; pointer-events: none; }
    .swatch .tick { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: var(--success); border-radius: 50%; align-items: center; justify-content: center; font-size: 9px; color: #000; display: none; z-index: 2; }
    .swatch-wrap.exhausted .swatch .tick { display: flex; }
    #zoom-hint { position: absolute; bottom: calc(var(--palette-h) + 10px); right: 12px; font-size: 9px; color: var(--muted); letter-spacing: 1px; opacity: 1; transition: opacity 1s ease; pointer-events: none; z-index: 5; }
    #zoom-hint.hidden { opacity: 0; }

    /* WIN */
    #win-overlay { position: fixed; inset: 0; background: rgba(15,15,20,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
    #win-overlay.show { opacity: 1; pointer-events: all; }
    #win-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #win-sub { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
    .win-btn { padding: 13px 28px; border-radius: 50px; border: none; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }
    #btn-timelapse { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    #btn-back-library { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* TIMELAPSE */
    #timelapse-overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
    #timelapse-overlay.show { opacity: 1; pointer-events: all; }
    #tl-label { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    #tl-canvas { image-rendering: pixelated; border-radius: 4px; max-width: 90vw; max-height: 60vh; }
    #btn-close-tl { padding: 12px 28px; border-radius: 50px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>

<div id="screen-library" class="screen active">
  <div class="app-header">
    <div class="logo">PixelFill</div>
    <button class="btn-upload" id="btn-upload-trigger">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0-1A6 6 0 1 0 8 2a6 6 0 0 0 0 12zM7.5 5.5v2H5.5v1h2v2h1v-2h2v-1h-2v-2h-1z"/></svg>
      Create
    </button>
    <input type="file" id="image-input" accept="image/*" style="display:none" />
  </div>
  <div id="library-body">
    <div class="lib-greeting">Choose a puzzle</div>
    <div class="lib-sub">TAP ANY PUZZLE TO PLAY</div>
    <div id="library-categories"></div>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="app-header">
    <button class="btn-back" id="btn-game-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
      <span id="game-back-label">Library</span>
    </button>
    <div id="progress-wrap">
      <div id="progress-label">Progress</div>
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="canvas-inner"><div id="grid"></div></div>
  </div>
  <div id="zoom-hint">PINCH TO ZOOM · DRAG TO PAN</div>
  <div id="palette">
    <div id="palette-label">Select a colour</div>
    <div id="swatches"></div>
  </div>
</div>

<div id="win-overlay">
  <div id="win-title">Completed! 🎨</div>
  <div id="win-sub">You filled every pixel.</div>
  <button class="win-btn" id="btn-timelapse">Watch Timelapse</button>
  <button class="win-btn" id="btn-back-library">Back to Library</button>
</div>

<div id="timelapse-overlay">
  <div id="tl-label">Timelapse</div>
  <canvas id="tl-canvas"></canvas>
  <button id="btn-close-tl">Close</button>
</div>

  const bigint = parseInt(hex.slice(1), 16);
  return [ (bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255 ];
}

// ═══════════════════════════════════
// THUMBNAIL RENDERER
// ═══════════════════════════════════
function renderThumb(puzzle) {
  const canvas = document.createElement('canvas');
  const rows = puzzle.grid.length, cols = puzzle.grid[0].length;
  const px = Math.min(8, Math.floor(100/rows), Math.floor(130/cols));
  canvas.width = cols*px; canvas.height = rows*px;
  canvas.style.width = canvas.width+'px'; canvas.style.height = canvas.height+'px';
  canvas.classList.add('puzzle-thumb');
  const ctx = canvas.getContext('2d');
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const v = puzzle.grid[r][c];
    if (!v) continue;
    ctx.fillStyle = PALETTE[v]||'#888';
    ctx.fillRect(c*px, r*px, px, px);
  }
  return canvas;
}

// ═══════════════════════════════════
// BUILD LIBRARY
// ═══════════════════════════════════
const libCatsEl = document.getElementById('library-categories');

function buildLibrary() {
  libCatsEl.innerHTML = '';
  const allPuzzles = [...LIBRARY, ...customPuzzles];
  const categories = {};
  allPuzzles.forEach(p => { if (!categories[p.category]) categories[p.category] = []; categories[p.category].push(p); });

  Object.entries(categories).forEach(([catName, puzzles]) => {
    const sec = document.createElement('div');
    sec.className = 'category-section';
    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `<span class="category-icon">${CATEGORY_ICONS[catName]||'🎨'}</span><span class="category-name">${catName}</span><span class="category-count">${puzzles.length} PUZZLES</span>`;
    sec.appendChild(header);

    const row = document.createElement('div');
    row.className = 'puzzle-row';
    puzzles.forEach(puzzle => {
      const card = document.createElement('div');
      card.className = 'puzzle-card' + (completed.has(puzzle.id) ? ' completed' : '');
      card.innerHTML = `<div class="puzzle-thumb-wrap"></div><div class="puzzle-card-info"><div class="puzzle-card-name">${puzzle.name}</div><div class="puzzle-card-meta"><span class="difficulty-tag diff-${puzzle.difficulty}">${puzzle.difficulty}</span><span class="puzzle-size-tag">${puzzle.grid[0].length}×${puzzle.grid.length}</span></div></div>`;
      card.querySelector('.puzzle-thumb-wrap').appendChild(renderThumb(puzzle));
      card.addEventListener('click', () => startPuzzle(puzzle));
      row.appendChild(card);
    });
    sec.appendChild(row);
    libCatsEl.appendChild(sec);
  });
}
buildLibrary();

// ═══════════════════════════════════
// UPLOAD LOGIC
// ═══════════════════════════════════
document.getElementById('btn-upload-trigger').onclick = () => document.getElementById('image-input').click();
document.getElementById('image-input').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      // Limit size to 24px max dimension for gameplay balance
      const maxDim = 24;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else { w = Math.round(w * maxDim / h); h = maxDim; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const grid = [];
      for (let r = 0; r < h; r++) {
        const row = [];
        for (let c = 0; c < w; c++) {
          const idx = (r * w + c) * 4;
          const [rVal, gVal, bVal, aVal] = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
          if (aVal < 128) { row.push(0); continue; }
          // Find closest palette color
          let best = 1, minD = Infinity;
          PALETTE_RGB.forEach(p => {
            const d = Math.sqrt((rVal-p.rgb[0])**2 + (gVal-p.rgb[1])**2 + (bVal-p.rgb[2])**2);
            if (d < minD) { minD = d; best = p.id; }
          });
          row.push(best);
        }
        grid.push(row);
      }
      const newPuzzle = {
        id: 'custom-' + Date.now(),
        name: file.name.split('.')[0],
        category: 'Custom',
        difficulty: 'medium',
        grid: grid
      };
      customPuzzles.push(newPuzzle);
      localStorage.setItem('pf-custom', JSON.stringify(customPuzzles));
      buildLibrary();
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
};

let PUZZLE_DATA=[], ROWS=0, COLS=0, totalCells=0;
let selectedColour=null, filledCells={}, history=[], colourTotals={};
let currentPuzzleId=null;
const RING_R=24, RING_CIRC=2*Math.PI*RING_R;

function resetGame() {
  filledCells={}; selectedColour=null; history=[];
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('timelapse-overlay').classList.remove('show');
  scale=1; tx=0; ty=0;
  document.getElementById('zoom-hint').classList.remove('hidden');
}

function startPuzzle(puzzle) {
  resetGame();
  currentPuzzleId=puzzle.id;
  PUZZLE_DATA=puzzle.grid; ROWS=PUZZLE_DATA.length; COLS=PUZZLE_DATA[0].length;
  totalCells=PUZZLE_DATA.flat().filter(v=>v!==0).length;
  document.getElementById('game-back-label').textContent=puzzle.category;
  buildGrid(); buildPalette(); applyTransform();
  showScreen('screen-game');
}

// ═══════════════════════════════════
// GRID
// ═══════════════════════════════════
const gridEl=document.getElementById('grid');
let cellEls=[];

function buildGrid() {
  gridEl.innerHTML=''; cellEls=[];
  gridEl.style.gridTemplateColumns=`repeat(${COLS},var(--cell-size))`;
  gridEl.style.gridTemplateRows=`repeat(${ROWS},var(--cell-size))`;
  for (let r=0;r<ROWS;r++) {
    cellEls[r]=[];
    for (let c=0;c<COLS;c++) {
      const num=PUZZLE_DATA[r][c];
      const cell=document.createElement('div');
      cell.className='cell';
      if (!num) { cell.style.cssText='background:transparent;border:none;pointer-events:none'; }
      else { if(COLS<=20) cell.textContent=num; cell.dataset.r=r; cell.dataset.c=c; cell.dataset.num=num; }
      gridEl.appendChild(cell);
      cellEls[r][c]=cell;
    }
  }
}

// ═══════════════════════════════════
// PALETTE
// ═══════════════════════════════════
const swatchesEl=document.getElementById('swatches');

function buildPalette() {
  swatchesEl.innerHTML='';
  const usedNums=[...new Set(PUZZLE_DATA.flat().filter(v=>v!==0))].sort((a,b)=>a-b);
  colourTotals={};
  usedNums.forEach(num => { colourTotals[num]=PUZZLE_DATA.flat().filter(v=>v===num).length; });
  usedNums.forEach(num => {
    const wrap=document.createElement('div');
    wrap.className='swatch-wrap'; wrap.dataset.num=num;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 54 54'); svg.classList.add('swatch-ring');
    svg.innerHTML=`<circle class="ring-bg" cx="27" cy="27" r="${RING_R}"/><circle class="ring-fg" cx="27" cy="27" r="${RING_R}" stroke-dasharray="${RING_CIRC}" stroke-dashoffset="${RING_CIRC}"/>`;
    const sw=document.createElement('div');
    sw.className='swatch'; sw.style.background=PALETTE[num];
    sw.innerHTML=`<span class="swatch-num">${num}</span><span class="tick">✓</span>`;
    wrap.appendChild(svg); wrap.appendChild(sw);
    wrap.addEventListener('pointerdown', e=>{ e.stopPropagation(); selectColour(num); });
    swatchesEl.appendChild(wrap);
  });
}

function selectColour(num) {
  selectedColour = num;
  document.querySelectorAll('.swatch-wrap').forEach(s => s.classList.remove('selected'));
  swatchesEl.querySelector(`.swatch-wrap[data-num="${num}"]`)?.classList.add('selected');
  document.querySelectorAll('.cell').forEach(cell => {
    cell.classList.remove('highlight');
    if (cell.dataset.num == num && !filledCells[`${cell.dataset.r},${cell.dataset.c}`]) cell.classList.add('highlight');
  });
}

function updateRing(num) {
  const filled=PUZZLE_DATA.flat().filter((v,i)=>{ const r=Math.floor(i/COLS),c=i%COLS; return v===num&&filledCells[`${r},${c}`]; }).length;
  const offset=RING_CIRC*(1-filled/colourTotals[num]);
  swatchesEl.querySelector(`.swatch-wrap[data-num="${num}"] .ring-fg`)?.setAttribute('stroke-dashoffset',offset);
}

// ═══════════════════════════════════
// FILL & INTERACTION
// ═══════════════════════════════════
let isFillDragging=false;

function fillCell(r, c) {
  const num = PUZZLE_DATA[r][c];
  if (!num || filledCells[`${r},${c}`] || !selectedColour) return;
  const cell = cellEls[r][c];
  if (selectedColour === num) {
    filledCells[`${r},${c}`] = num; 
    history.push({r, c, colourNum: num});
    cell.style.background = PALETTE[num]; cell.textContent = '';
    cell.classList.remove('highlight'); cell.classList.add('filled', 'correct-flash');
    setTimeout(() => cell.classList.remove('correct-flash'), 300);
    document.getElementById('progress-bar').style.width = (Object.keys(filledCells).length / totalCells * 100) + '%';
    updateRing(num);
    const rem = PUZZLE_DATA.flat().filter((v, i) => { const rr = Math.floor(i / COLS), cc = i % COLS; return v === num && !filledCells[`${rr},${cc}`]; });
    if (!rem.length) swatchesEl.querySelector(`.swatch-wrap[data-num="${num}"]`)?.classList.add('exhausted');
    if (Object.keys(filledCells).length === totalCells) {
      completed.add(currentPuzzleId);
      localStorage.setItem('pf-completed', JSON.stringify([...completed]));
      setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 400);
    }
  } else if (!isFillDragging && !isDragging && !activePanTouch) {
    cell.classList.add('wrong-colour');
    setTimeout(() => cell.classList.remove('wrong-colour'), 350);
  }
}

const wrap=document.getElementById('canvas-wrap');
const inner=document.getElementById('canvas-inner');
let scale=1,tx=0,ty=0,isDragging=false,lastX=0,lastY=0,lastDist=null,activePanTouch=null;

function applyTransform() {
  scale=Math.max(0.3,Math.min(5,scale));
  inner.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(${scale})`;
}

// Interaction logic
wrap.addEventListener('mousedown', e => {
  const cell = e.target.closest('.cell');
  if (cell && +cell.dataset.num === selectedColour && !filledCells[`${cell.dataset.r},${cell.dataset.c}`]) {
    isFillDragging = true; fillCell(+cell.dataset.r, +cell.dataset.c); return;
  }
  isDragging = true; lastX = e.clientX; lastY = e.clientY; wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (isFillDragging) {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el?.closest('.cell');
    if (cell?.dataset.r) fillCell(+cell.dataset.r, +cell.dataset.c);
    return;
  }
  if (!isDragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; applyTransform();
});
window.addEventListener('mouseup', () => { isDragging = false; isFillDragging = false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) { lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); activePanTouch = null; return; }
  const t = e.touches[0]; const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el?.closest('.cell');
  if (cell && +cell.dataset.num === selectedColour && !filledCells[`${cell.dataset.r},${cell.dataset.c}`]) {
    isFillDragging = true; fillCell(+cell.dataset.r, +cell.dataset.c);
  } else { activePanTouch = t.identifier; lastX = t.clientX; lastY = t.clientY; }
}, {passive: true});
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2) { e.preventDefault(); const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); if (lastDist) scale *= d / lastDist; lastDist = d; applyTransform(); return; }
  if (isFillDragging) {
    const t = e.touches[0]; const el = document.elementFromPoint(t.clientX, t.clientY);
    const cell = el?.closest('.cell');
    if (cell?.dataset.r) fillCell(+cell.dataset.r, +cell.dataset.c);
    return;
  }
  if (activePanTouch === null) return;
  const t = [...e.touches].find(t => t.identifier === activePanTouch); if (!t) return;
  e.preventDefault(); tx += t.clientX - lastX; ty += t.clientY - lastY; lastX = t.clientX; lastY = t.clientY; applyTransform();
}, {passive: false});
wrap.addEventListener('touchend',e=>{ if(e.touches.length<2)lastDist=null; if(![...e.touches].find(t=>t.identifier===activePanTouch))activePanTouch=null; isFillDragging = false; });
wrap.addEventListener('wheel',e=>{ e.preventDefault(); scale*=e.deltaY<0?1.1:0.9; applyTransform(); },{passive:false});

// ═══════════════════════════════════
// WIN + TIMELAPSE
// ═══════════════════════════════════
document.getElementById('btn-timelapse').addEventListener('click',()=>{ document.getElementById('win-overlay').classList.remove('show'); playTimelapse(); });
document.getElementById('btn-back-library').addEventListener('click',()=>{ document.getElementById('win-overlay').classList.remove('show'); showScreen('screen-library'); resetGame(); buildLibrary(); });
document.getElementById('btn-close-tl').addEventListener('click',()=>{ document.getElementById('timelapse-overlay').classList.remove('show'); document.getElementById('win-overlay').classList.add('show'); });

function playTimelapse() {
  const tlo=document.getElementById('timelapse-overlay');
  const tlc=document.getElementById('tl-canvas');
  const PX=Math.max(4,Math.floor(Math.min(window.innerWidth*0.88,window.innerHeight*0.58)/Math.max(ROWS,COLS)));
  tlc.width=COLS*PX; tlc.height=ROWS*PX;
  tlc.style.width=tlc.width+'px'; tlc.style.height=tlc.height+'px';
  const ctx=tlc.getContext('2d');
  ctx.fillStyle='#1a1a24'; ctx.fillRect(0,0,tlc.width,tlc.height);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(PUZZLE_DATA[r][c]){ ctx.fillStyle='#2a2a3a'; ctx.fillRect(c*PX,r*PX,PX,PX); }
  tlo.classList.add('show');
  let i=0; const BATCH=Math.max(1,Math.floor(history.length/150));
  function step() {
    for(let b=0;b<BATCH&&i<history.length;b++,i++){ const{r,c,colourNum}=history[i]; ctx.fillStyle=PALETTE[colourNum]; ctx.fillRect(c*PX,r*PX,PX,PX); }
    if(i<history.length) setTimeout(step,25);
  }
  step();
}

if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
